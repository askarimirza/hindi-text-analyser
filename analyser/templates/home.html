<!DOCTYPE html>
<html>
<head>
    <title>Hindi Text Analyzer</title>

    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #bfbfc1, #ffffff);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            background: white;
            width: 700px;
            max-width: 90%;
            padding: 40px;
            border-radius: 25px;
            box-shadow: 0 25px 60px rgba(0,0,0,0.25);
            text-align: center;
        }

        h1 {
            margin-bottom: 25px;
            font-size: 32px;
            color: #333;
        }

        textarea {
            width: 100%;
            height: 140px;
            padding: 18px;
            border-radius: 18px;
            border: 1px solid #ddd;
            font-size: 16px;
            resize: none;
            outline: none;
            transition: 0.3s ease;
            box-shadow: inset 0 4px 8px rgba(0,0,0,0.05);
        }

        textarea:focus {
            border-color: #667eea;
            box-shadow: 0 0 12px rgba(102,126,234,0.4);
        }

        button {
            margin-top: 20px;
            padding: 14px 30px;
            border: none;
            border-radius: 40px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s ease;
            box-shadow: 0 10px 25px rgba(0,0,0,0.25);
        }

        button:hover {
            transform: translateY(-4px);
            box-shadow: 0 15px 35px rgba(0,0,0,0.35);
        }

        .result-box {
            margin-top: 25px;
            padding: 20px;
            background: #f4f6ff;
            border-radius: 18px;
            box-shadow: inset 0 3px 10px rgba(0,0,0,0.05);
            text-align: left;
            animation: fadeIn 0.4s ease-in-out;
        }

        .result-box h3 {
            margin-top: 0;
            color: #444;
        }

        .cleaned {
            font-weight: 600;
            color: #333;
            margin-top: 10px;
            line-height: 1.6;
        }

        ul {
            padding-left: 15px;
        }

        li {
            margin: 5px 0;
            font-size: 15px;
        }

        @keyframes fadeIn {
            from {opacity: 0; transform: translateY(10px);}
            to {opacity: 1; transform: translateY(0);}
        }

    </style>
</head>
<body>

<div class="container">
    <h1>Hindi Text Analyzer</h1>

    <form method="POST">
        {% csrf_token %}
        <textarea name="text" placeholder="Enter Hindi sentence here..."></textarea>
        <br>
        <button type="submit">Analyze Text </button>
    </form>

    {% if cleaned_sentence %}
    <div class="result-box">
        <h3>Sentence After Removing Stopwords:</h3>
        <div class="cleaned">
            {{ cleaned_sentence }}
        </div>
    </div>
    {% endif %}

    {% if result %}
    <div class="result-box">
        <h3>Word Frequency Result:</h3>
        <ul>
            {% for word, count in result.items %}
                <li><strong>{{ word }}</strong> : {{ count }}</li>
            {% endfor %}
        </ul>
    </div>
    {% endif %}

</div>

</body>
</html>
